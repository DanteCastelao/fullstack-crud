services:
  backend:
    build: ./backend
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/{{PROJECT_NAME}}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
